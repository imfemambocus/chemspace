# react-three-fiber declares its own JSX intrinsics (ambientLight, directionalLight,
# meshStandardMaterial, instancedMesh, sphereGeometry, ...) that map onto three.js objects.
# S6747 ("Unknown property") does not know about them and flags every three.js element and
# prop as unknown, so it is a pure false positive here. Suppress it on the R3F files only.
sonar.issue.ignore.multicriteria=r3f1,r3f2,r3f3,r3f4
