<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <!-- near-black card gradient, same as the app's viewer background -->
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="70%" stop-color="#0a0a0a"/>
    </radialGradient>
    <!-- soft teal spotlight behind the molecule -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <!-- bloom, echoing the postprocessing pass in the viewer -->
    <filter id="bloom" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1279" height="319" rx="15.5" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  <ellipse cx="945" cy="160" rx="300" ry="240" fill="url(#glow)"/>

  <!-- text block -->
  <text x="90" y="112" fill="#6b7280" font-size="15" font-weight="600" letter-spacing="4">MOLECULAR VIEWER</text>
  <text x="88" y="188" font-size="76" font-weight="700" letter-spacing="-1">
    <tspan fill="#ededed">Chem</tspan><tspan fill="#2dd4bf">Space</tspan>
  </text>
  <text x="90" y="232" fill="#8a8a8a" font-size="25">Real 3D molecular structures, straight from a PubChem CID.</text>
  <text x="91" y="278" fill="#14b8a6" font-size="20" letter-spacing="1" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">C8H10N4O2</text>

  <!-- ball-and-stick benzene mark: teal bonds, CPK-tinted atoms, glowing like the app -->
  <g stroke="#2dd4bf" stroke-width="6" stroke-linecap="round">
    <line x1="945" y1="88"  x2="1007" y2="124"/>
    <line x1="1007" y1="124" x2="1007" y2="196"/>
    <line x1="1007" y1="196" x2="945" y2="232"/>
    <line x1="945" y1="232" x2="883" y2="196"/>
    <line x1="883" y1="196" x2="883" y2="124"/>
    <line x1="883" y1="124" x2="945" y2="88"/>
    <line x1="945" y1="88"  x2="945" y2="42"/>
    <line x1="1007" y1="196" x2="1058" y2="226"/>
    <line x1="883" y1="196" x2="832" y2="226"/>
  </g>
  <g filter="url(#bloom)">
    <circle cx="945" cy="88"  r="12" fill="#ededed"/>
    <circle cx="1007" cy="124" r="12" fill="#ededed"/>
    <circle cx="1007" cy="196" r="12" fill="#ededed"/>
    <circle cx="945" cy="232" r="12" fill="#ededed"/>
    <circle cx="883" cy="196" r="12" fill="#ededed"/>
    <circle cx="883" cy="124" r="12" fill="#ededed"/>
    <circle cx="945" cy="42"  r="15" fill="#ff4d4d"/>
    <circle cx="1058" cy="226" r="14" fill="#5b7bff"/>
    <circle cx="832" cy="226" r="15" fill="#2dd4bf"/>
  </g>
</svg>
